  const COLORES = { 2024: '#2E7D32', 2025: '#1E4FBF', 2026: '#B0141C' };

  const KM_INTERNOS = { 2024: 218452, 2025: 119466, 2026: 99894 };
  const CONECTOR_24_25 = 205;
  const CONECTOR_25_26 = 9852;
  const SHOWS_POR_ANIO = { 2024: 37, 2025: 49, 2026: 61 };

  const CIRCUNFERENCIA_TIERRA = 40075;
  const DISTANCIA_LUNA = 384400;
  const VELOCIDAD_VUELO_KMH = 850;
  const HORAS_POR_SHOW = 1.5;

  let aniosActivos = [2024, 2025, 2026];

  function calcularYPintarStats(){
    const totalKm = aniosActivos.reduce((acc, a) => acc + KM_INTERNOS[a], 0)
      + (aniosActivos.includes(2024) && aniosActivos.includes(2025) ? CONECTOR_24_25 : 0)
      + (aniosActivos.includes(2025) && aniosActivos.includes(2026) ? CONECTOR_25_26 : 0);

    const totalShows = aniosActivos.reduce((acc, a) => acc + SHOWS_POR_ANIO[a], 0);
    const horasVuelo = totalKm / VELOCIDAD_VUELO_KMH;
    const horasShow = totalShows * HORAS_POR_SHOW;
    const diasVolando = horasVuelo / 24;

    document.getElementById('stats-km').innerHTML = `
      <div><strong>${Math.round(totalKm).toLocaleString('es-AR')}</strong><span>Kilómetros recorridos</span></div>
      <div><strong>${(totalKm / CIRCUNFERENCIA_TIERRA).toFixed(2)}</strong><span>Vueltas al mundo</span></div>
      <div><strong>${(totalKm / DISTANCIA_LUNA).toFixed(2)}</strong><span>Viajes a la Luna (ida)</span></div>
    `;
    document.getElementById('stats-horas').innerHTML = `
      <div><strong>${diasVolando.toFixed(1)}</strong><span>Días completos en el aire</span></div>
      <div><strong>${Math.round(horasShow).toLocaleString('es-AR')} hs</strong><span>Arriba del escenario</span></div>
    `;
  }

  const mapa = L.map('mapa').setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 18
  }).addTo(mapa);

  function agruparCercanos(lista, umbral){
    const grupos = [];
    lista.forEach(l => {
      let grupo = grupos.find(g => Math.hypot(g[0].lat - l.lat, g[0].lng - l.lng) < umbral);
      if(!grupo){ grupo = []; grupos.push(grupo); }
      grupo.push(l);
    });
    return grupos;
  }
  const grupos = agruparCercanos(LUGARES_ORIG, 0.3);
  const LUGARES = [];
  grupos.forEach(grupo => {
    if(grupo.length === 1){ LUGARES.push(grupo[0]); return; }
    const radio = 0.35;
    grupo.forEach((l, i) => {
      const angulo = (2 * Math.PI * i) / grupo.length;
      LUGARES.push({ ...l, lat: l.lat + radio * Math.cos(angulo), lng: l.lng + radio * Math.sin(angulo), repetido: true, totalEnGrupo: grupo.length });
    });
  });

  const capasPorAnio = {};
  [2024, 2025, 2026].forEach(anio => {
    const grupo = L.layerGroup().addTo(mapa);
    const lugaresAnio = LUGARES.filter(l => l.anio === anio);
    lugaresAnio.forEach(l => {
      const marker = L.circleMarker([l.lat, l.lng], { radius: 6, fillColor: COLORES[anio], color: '#fff', weight: 1.5, fillOpacity: 0.9 });
      marker.bindPopup(`

        <div class="popup-title">${l.ciudad}</div>
        <div style="font-size:.8rem; color:#555; margin-top:2px;">${l.lugar || ''}</div>
        ${l.repetido ? `<div style="font-size:.7rem; color:#D71920; margin-top:6px; font-weight:700;">📍 Tocaron varias veces en esta zona (${l.totalEnGrupo} shows)</div>` : ''}
      `);
      marker.addTo(grupo);
    });
    const puntos = LUGARES_ORIG.filter(l => l.anio === anio).map(l => [l.lat, l.lng]);
    L.polyline(puntos, { color: COLORES[anio], weight: 1.5, opacity: 0.5, dashArray: '4 6' }).addTo(grupo);

  });

  document.querySelectorAll('.toggle-btn').forEach(btn => {

      if(activo){ mapa.addLayer(capa); aniosActivos.push(anio); }
      else { mapa.removeLayer(capa); aniosActivos = aniosActivos.filter(a => a !== anio); }
      calcularYPintarStats();
    });
  });

  calcularYPintarStats();

  (function setLastUpdate(){
    const el = document.getElementById('last-update');
    if(!el) return;
    const d = new Date(document.lastModified);
    if(isNaN(d.getTime())){ el.textContent = 'sin datos'; return; }
    el.textContent = d.toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' });
  })();
</script>
