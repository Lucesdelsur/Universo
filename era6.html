<style>
/* =============================================================
   UNIVERSO MUSICAL — CA7RIEL & Paco Amoroso
   Estética editorial (Rolling Stone) — blanco, serif, rojo quirúrgico
   ============================================================= */
:root{
  --bg: #FFFFFF;
  --bg-soft: #FAFAFA;
  --card: #FFFFFF;
  --card-hover: #F5F5F5;
  --line: #E0E0E0;
  --text: #111111;
  --text-dim: #555555;

  --red: #D71920;
  --ink: #111111;

  /* Todas las categorías comparten el mismo rojo editorial (a propósito:
     el sistema Rolling Stone no codifica temas por color, usa el rojo
     como acento único y consistente para cualquier etiqueta). */
  --lime: #D71920;
  --magenta: #D71920;
  --cyan: #D71920;
  --orange: #D71920;
  --violet: #D71920;
  --gold: #D71920;
  --gray: #555555;

  --display: 'Merriweather', serif;
  --body: 'Lora', serif;
  --mono: 'Inter', sans-serif;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  font-size:17px;
  overflow-x:hidden;
  min-height:100vh;
}
::selection{ background:var(--red); color:#fff; }
a{ color:inherit; }
button{ font-family:inherit; cursor:pointer; }
:focus-visible{ outline:2px solid var(--red); outline-offset:2px; }

/* =========================================================
   NAV superior — sticky, blanco, logo centrado
   ========================================================= */
#site-nav{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:center; gap:30px;
  background:#fff; border-bottom:1px solid var(--line);
  padding:14px 20px;
}
#site-nav a{
  font-family:var(--mono); font-weight:600; font-size:.85rem; letter-spacing:.1em;
  text-transform:uppercase; color:var(--ink); text-decoration:none;
  padding-bottom:4px; border-bottom:2px solid transparent;
}
#site-nav a:hover{ color:var(--red); }
#site-nav a.active{ border-bottom-color:var(--red); color:var(--red); }

/* =========================================================
   HERO — color sólido por Era (o foto, cuando la tengamos)
   ========================================================= */
.hero{
  position:relative;
  min-height:46vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:56px 24px 44px;
  background:var(--hero-bg, #fff);
  color:var(--hero-fg, var(--ink));
}
.hero-eyebrow{
  font-family:var(--mono); font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--hero-fg, var(--ink)); font-size:.85rem; opacity:.85;
}
.hero .kicker{
  font-family:var(--mono); font-weight:700; font-size:.85rem; letter-spacing:.14em;
  text-transform:uppercase; color:var(--red); background:#fff; display:inline-block;
  padding:5px 12px; margin-top:16px;
}
.hero h1{
  font-family:var(--display);
  font-weight:900;
  font-size:clamp(2.2rem, 8vw, 4.4rem);
  line-height:1.1;
  color:var(--hero-fg, var(--ink));
  margin-top:14px;
}
.hero h1 span{ display:block; }
.hero h1.titulo-eras{ font-size:clamp(2.4rem, 8vw, 4.6rem); }
.hero p.sub{
  max-width:640px; margin-top:16px; color:var(--hero-fg, var(--text-dim)); font-size:1.2rem;
  font-style:italic; font-family:var(--body); opacity:.9;
}
.hero-divider{
  width:60px; height:2px; background:var(--red); border:none; margin:22px auto 4px;
}
.contador-shows{
  margin-top:22px; display:inline-block;
  font-family:var(--mono); font-size:1.05rem; font-weight:600;
  background:#fff; color:var(--ink); border:1px solid var(--line);
  padding:10px 18px;
}
.contador-shows strong{ color:var(--red); }
.hero .stats{
  display:flex; gap:44px; margin-top:30px; flex-wrap:wrap; justify-content:center;
}
.hero .stats div{ font-family:var(--mono); text-align:center; }
.hero .stats strong{ display:block; font-family:var(--display); font-weight:900; font-size:1.9rem; color:var(--hero-fg, var(--ink)); }
.hero .stats span{ font-size:.8rem; color:var(--hero-fg, var(--text-dim)); text-transform:uppercase; letter-spacing:.1em; opacity:.85; }
.stats-source{
  font-family:var(--mono); font-size:.85rem; color:var(--hero-fg, var(--text-dim));
  opacity:.7; margin-top:28px; width:100%; text-align:center;
}

/* =========================================================
   Bloque foto + texto de la Era
   ========================================================= */
.era-bloque{
  max-width:960px; margin:48px auto; padding:0 24px;
  display:flex; gap:32px; flex-wrap:wrap; align-items:flex-start;
}
.era-foto{
  width:320px; aspect-ratio:3/2; flex-shrink:0;
  background:var(--bg-soft); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:.85rem; color:var(--text-dim); text-align:center; padding:16px;
}
.era-foto img{ width:100%; height:100%; object-fit:cover; }
.era-texto{ flex:1; min-width:280px; font-size:1.15rem; line-height:1.8; color:var(--text); font-family:var(--body); text-align:justify; }
.era-texto p{ margin-bottom:18px; }
.era-texto p:last-child{ margin-bottom:0; }
.era-texto strong{ font-weight:700; color:var(--ink); }

/* ---- Variante: 2 fotos en fila arriba, texto ancho completo debajo ---- */
.era-bloque-doble{ flex-direction:column; }
.era-fotos-fila{ display:flex; gap:20px; width:100%; flex-wrap:wrap; }
.era-fotos-fila .era-foto{ flex:1; width:auto; min-width:220px; }
.era-bloque-doble .era-texto{ width:100%; }

/* =========================================================
   Navegación Era anterior / siguiente / inicio
   ========================================================= */
.era-prevnext{
  max-width:960px; margin:0 auto 20px; padding:0 24px;
  display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
}
.era-prevnext a{
  font-family:var(--mono); font-weight:600; font-size:.9rem; color:var(--ink); text-decoration:none;
  border:1px solid var(--line); padding:10px 18px; text-transform:uppercase; letter-spacing:.04em;
}
.era-prevnext a:hover{ border-color:var(--red); color:var(--red); }
.era-prevnext .vacio{ visibility:hidden; }
.era-prevnext-bottom{ margin:60px auto 30px; padding-top:30px; border-top:1px solid var(--line); }
.era-prevnext-bottom .volver-inicio{
  color:var(--red); border-color:var(--red); font-weight:700;
}

/* =========================================================
   FILTROS
   ========================================================= */
#filterbar{
  position:sticky; top:53px; z-index:40;
  background:rgba(255,255,255,.96);
  border-bottom:1px solid var(--line);
  padding:14px 20px;
  display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:center;
}
.filter-group{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; }
.filter-label{
  font-family:var(--mono); font-size:.8rem; text-transform:uppercase; letter-spacing:.1em;
  color:var(--text-dim); margin-right:4px;
}
.pill{
  font-family:var(--mono); font-weight:600; font-size:.85rem;
  background:transparent; color:var(--text-dim);
  border:1px solid var(--line); border-radius:100px;
  padding:7px 16px; transition:all .15s ease;
}
.pill:hover{ border-color:var(--red); color:var(--red); }
.pill.active{ color:#fff; background:var(--red); border-color:var(--red); font-weight:700; }
select{
  font-family:var(--mono); background:#fff; color:var(--text);
  border:1px solid var(--line); border-radius:4px; padding:7px 10px; font-size:.9rem;
}
#reset-filters{
  font-family:var(--mono); font-size:.8rem; color:var(--text-dim);
  background:none; border:1px dashed var(--line); border-radius:4px; padding:6px 12px;
}
#reset-filters:hover{ color:var(--red); border-color:var(--red); }

/* =========================================================
   LÍNEA DE TIEMPO — franjas, una debajo de la otra
   ========================================================= */
#timeline-wrap{ max-width:760px; margin:56px auto 100px; padding:0 24px; }
#timeline{ display:flex; flex-direction:column; }
.empty-state{ text-align:center; padding:80px 20px; color:var(--text-dim); font-family:var(--mono); }

@keyframes riseIn{ to{ opacity:1; transform:translateY(0); } }

.tl-row{
  display:flex; gap:24px; align-items:flex-start;
  padding:26px 0; border-top:1px solid var(--line);
  cursor:pointer; transition:opacity .15s ease;
  opacity:0; transform:translateY(14px);
  animation:riseIn .4s ease forwards;
}
.tl-row:hover{ opacity:.7; }
.tl-row-thumb{
  width:150px; aspect-ratio:3/2; flex-shrink:0; overflow:hidden;
  background:var(--bg-soft); position:relative;
  display:flex; align-items:center; justify-content:center;
}
.tl-row-thumb img{ width:100%; height:100%; object-fit:cover; }
.tl-row-info{ flex:1; min-width:0; }

.tl-date{ font-family:var(--mono); font-size:.8rem; color:var(--text-dim); letter-spacing:.03em; }
.tl-cat{
  display:inline-block; font-family:var(--mono); font-size:.72rem; text-transform:uppercase;
  letter-spacing:.1em; margin-left:10px; color:var(--tag-color, var(--red)); font-weight:700;
}
.tl-title{ font-family:var(--display); font-weight:900; font-size:1.5rem; line-height:1.3; margin-top:10px; color:var(--ink); }
.tl-thumb .ph{ font-family:var(--mono); font-size:.9rem; color:var(--text-dim); text-align:center; padding:8px; }
.tl-play-badge{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,.9); color:var(--red);
  display:flex; align-items:center; justify-content:center; font-size:1.1rem;
  border:1.5px solid var(--red);
}
.tl-lugar{ margin-top:8px; font-family:var(--mono); font-size:.85rem; color:var(--text-dim); }
.tl-teaser{ margin-top:12px; font-size:1.05rem; color:var(--text-dim); line-height:1.6; font-family:var(--body); font-style:italic; }
.tl-leer{
  margin-top:12px; font-family:var(--mono); font-weight:700; font-size:.85rem;
  letter-spacing:.05em; color:var(--red); text-transform:uppercase;
}
.tl-publico{ font-weight:400; color:var(--text-dim); font-size:.85em; }

/* ---- Hitos "mayor": tratamiento destacado dentro de la misma línea de tiempo ---- */
.tl-row-mayor{
  flex-direction:column; padding:44px 0 48px;
  border-top:3px solid var(--hero-bg, var(--red));
}
.tl-row-mayor .tl-row-thumb{ width:100%; aspect-ratio:16/9; }
.tl-row-mayor .tl-title{ font-size:2.1rem; margin-top:16px; }
.tl-row-mayor .tl-teaser{ font-size:1.15rem; }

@media (max-width: 600px){
  .tl-row{ flex-direction:column; }
  .tl-row-thumb{ width:100%; }
  .tl-row-mayor .tl-title{ font-size:1.6rem; }
}

/* =========================================================
   MODAL
   ========================================================= */
#modal-overlay{
  position:fixed; inset:0; background:rgba(17,17,17,.75); backdrop-filter:blur(2px);
  z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; visibility:hidden; transition:opacity .2s ease, visibility .2s ease;
}
#modal-overlay.open{ opacity:1; visibility:visible; }
#modal{
  background:#fff; border:1px solid var(--line);
  max-width:640px; width:100%; max-height:88vh; overflow-y:auto;
  padding:32px; position:relative;
  transform:scale(.97); transition:transform .2s ease;
}
#modal-overlay.open #modal{ transform:scale(1); }
#modal-close{
  position:absolute; top:18px; right:18px; background:#fff; border:1px solid var(--line);
  color:var(--ink); width:34px; height:34px; border-radius:50%; font-size:1rem; z-index:2;
}
#modal-close:hover{ background:var(--red); color:#fff; border-color:var(--red); }
#modal-media{ position:relative; width:100%; margin-bottom:16px; background:#000; aspect-ratio:16/9; }
#modal-media img{ width:100%; height:100%; object-fit:cover; display:block; }
#modal-photo{
  width:100%; aspect-ratio:16/9; overflow:hidden; margin-bottom:18px;
  background:var(--bg-soft); display:flex; align-items:center; justify-content:center;
}
#modal-photo img{ width:100%; height:100%; object-fit:cover; }
#modal-photo.hidden{ display:none; }
.modal-cat-row{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
.modal-cat-chip{
  font-family:var(--mono); font-weight:700; font-size:.75rem; text-transform:uppercase; letter-spacing:.1em;
  color:var(--red); display:inline-block;
}
#modal-date{ font-family:var(--mono); font-size:.9rem; color:var(--text-dim); margin-bottom:6px; }
#modal-title{ font-family:var(--display); font-weight:900; font-size:1.8rem; line-height:1.25; margin-bottom:14px; color:var(--ink); }
#modal-desc{ color:var(--text); line-height:1.75; font-size:1.1rem; margin-bottom:18px; font-family:var(--body); }
#modal-data{ display:flex; flex-wrap:wrap; gap:10px; }
.data-chip{
  font-family:var(--mono); font-size:.85rem; background:var(--bg-soft);
  border:1px solid var(--line); padding:8px 12px;
}
.data-chip b{ color:var(--red); }
.modal-yt-link{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; align-items:center; gap:8px;
  font-family:var(--mono); font-weight:700; font-size:.95rem; color:#fff;
  text-decoration:none; background:rgba(17,17,17,.85); border:1.5px solid #fff;
  padding:12px 22px; border-radius:100px; white-space:nowrap;
}
.modal-yt-link:hover{ background:var(--red); border-color:var(--red); }

footer{
  text-align:center; padding:40px 20px 60px; color:var(--text-dim); font-family:var(--mono); font-size:.9rem;
  border-top:1px solid var(--line);
}

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}

</style>

<script>
/* =============================================================
   1) DATOS DEL TIMELINE — EDITÁ ESTO LIBREMENTE
   -------------------------------------------------------------
   Cada evento es un objeto con:
     fecha:      "AAAA-MM-DD" (si no sabés el mes/día exacto, usá "AAAA-01-01")
     categorias: array con 1 o más categorías, ej: ["Canción"] o
                 ["Canción", "Video Clip"]. Deben coincidir con una clave
                 de CATEGORIAS (más abajo). (Las Eras son la excepción:
                 usan "categoria: \"Era\"" en singular, no toques eso.)
     titulo:     título corto
     teaser:     1 frase que aparece en la tarjeta chica
     descripcion:texto más largo que aparece al hacer click
     foto:       URL de una imagen (dejalo en "" si todavía no tenés la foto:
                 se muestra un placeholder para que sepas dónde va)
     youtube:    ID del video de YouTube (la parte después de "v=" en la URL,
                 son 11 caracteres). Dejalo en "" si no hay video para ese hito.
     datos:      lista de pares { etiqueta, valor } para mostrar como "ficha técnica"
     destacado:  false = solo un punto lleno en la línea (sin tarjeta).
                 Si no lo escribís, por defecto es true (tarjeta completa).
     publico:    opcional, texto tipo "8.000 personas" — aparece entre
                 paréntesis al lado del título (para Conciertos).
     enlace:     opcional, URL de un artículo/nota externa (para Entrevistas
                 sin foto ni video). Si está presente, el click NO abre el
                 modal: te lleva directo a esa URL en una pestaña nueva.
                 Si no hay foto/youtube/enlace, la tarjeta se ve sin
                 miniatura (solo el título).
   ============================================================= */

  const CATEGORIAS = {
    "Era":        { color: "var(--violet)" },
    "Discografía": { color: "var(--lime)" },
    "Conciertos":  { color: "var(--gold)" },
    "Colaboración": { color: "var(--red)" },
    "Prensa":     { color: "var(--red)" },
  };

  // Devuelve el/los color(es) de un array de categorías
  function catColors(categorias){
    return (categorias || []).map(c => CATEGORIAS[c] ? CATEGORIAS[c].color : 'var(--lime)');
  }
  // Devuelve un valor CSS de background: sólido si es 1 categoría,
  // conic-gradient partido en porciones iguales si son 2 o más.
  function catBackground(categorias){
    const colors = catColors(categorias);
    if(colors.length <= 1) return colors[0] || 'var(--lime)';
    const step = 360 / colors.length;
    const stops = colors.map((c, i) => `${c} ${i*step}deg ${(i+1)*step}deg`).join(', ');
    return `conic-gradient(${stops})`;
  }

  /* Las Eras son hitos con categoria:"Era" que además llevan el campo
     "hasta" (fecha de cierre del período). El resto de los hitos se
     agrupan automáticamente bajo la Era vigente según su fecha. */
  const DATA = [
    // ---------- ERAS ----------
    {
      fecha: "2011-01-01", hasta: "2017-12-31", categoria: "Era",
      titulo: "Astor", lugar: "Buenos Aires, Argentina",
      colorEra: "var(--violet)",
      teaser: "Los años en salas de ensayo.",
      descripcion: "<p>Crecieron musicalmente juntos. «Astor y las flores de marte» fue su primera banda, con pulsión rockera-funkera-spinetteana. Solo grabaron un álbum y un single para un concurso de bandas. Por esos años Catriel lanza su primer disco (2015) y firma por primera vez con 5020 Records el sello que lo acompaña en su carrera astronómica años más tarde.</p>",
      foto: "images/era1-astor-y-las-flores-de-marte.jpg", youtube: "",
      datos: [{etiqueta:"Período", valor:"2011–2017"}]
    },
    {
      fecha: "2018-01-01", hasta: "2020-05-31", categoria: "Era",
      titulo: "Nace el mito", lugar: "Buenos Aires, Argentina",
      colorEra: "var(--cyan)",
      teaser: "Hackeo a la escena del trap",
      descripcion: "<p>Para cuando se unieron como dúo, Catriel ya se llamaba Ca7riel (con el 7, su nombre de rapero) y tocaba en escenarios. Su primera canción juntos fue \"Piola\", le siguió \"A mí no\" y terminaron de hackear la matrix de la escena del trap argentino con \"JALA JALA\" y su video diseñado para ser visto en el celular.</p><p>En julio de 2018 se presentaron en un pequeño lugar, y para fin de ese año hicieron sold out en dos Niceto Club (una sala tan húmeda como emblemática, que aloja a unas 1200 almas desaforadas).</p><p>En 2019 llegó su primera gira de 54 fechas por Argentina, Uruguay y Paraguay. Fue también la primera vez que cruzaron el charco para desembarcar en España y Alemania. El cierre fue en el Estadio Obras, histórico tester para el rock nacional.</p><p>Estaban preparando el terreno para dar el gran salto: el 16 de febrero de 2020 se presentaron en el Festival Cara B en Barcelona, una conocida plataforma para artistas con proyección internacional.</p>",
      foto: "", fotos: ["images/era2-pared-roja.jpg", "images/era2-recital-2019.png"], youtube: "",
      datos: [{etiqueta:"Período", valor:"2018–2020"}]
    },
    {
      fecha: "2020-06-01", hasta: "2021-12-31", categoria: "Era",
      titulo: "FLY SOLO", lugar: "Argentina",
      colorEra: "var(--gray)",
      teaser: "Una pandemia mundial y dos discos icónicos.",
      descripcion: "<p>La pandemia interrumpe el impulso que habían construido tras el histórico Obras de 2019. La intensidad acumulada empieza a pasar factura y, para cuidar la amistad y evitar que el proyecto se desgaste, deciden separarse temporalmente. Es una etapa introspectiva en la que cada uno busca su propia voz: nacen El Disko (Ca7riel) y Saeta (Paco Amoroso).</p><p><strong>Ca7riel</strong> (Página/12, 2020): \"Antes de la cuarentena me estaba volviendo loco. Estaba metido en una rueda de hámster donde el personaje de Ca7riel se estaba comiendo al Cato real. El parate me salvó la cabeza\".</p><p><strong>Paco Amoroso</strong> (Página/12, 2021): \"Este disco solista fue un poco como hacerme adulto. Tuve que sentarme a escribir y hacerme cargo de mis miedos sin tener el escudo del chiste o a Cato al lado para tapar los baches\".</p>",
      foto: "", fotos: ["images/era3-parrilla.jpeg", "images/era3-glitch-face.png"], youtube: "",
      datos: [{etiqueta:"Período", valor:"2020–2021"}]
    },
    {
      fecha: "2022-01-01", hasta: "2023-12-31", categoria: "Era",
      titulo: "Temporada II", lugar: "Argentina",
      colorEra: "var(--orange)",
      teaser: "",
      descripcion: "<p>Vuelven sintonizados en otra frecuencia. Ya no son los chicos rústicos del trap de 2019: regresan después de absorber la electrónica, el house y el pop durante sus proyectos solistas. Lanzan \"Paga Dios\" y \"En el After\", confirmando que la química seguía intacta y sellando el reencuentro con un Obras a fin de año.</p><p><strong>Paco Amoroso</strong> (Clarín, 2022): \"Hacer música solos estuvo buenísimo, pero cuando nos volvimos a juntar en el estudio y tiramos la primera barra, nos miramos y dijimos: 'Claro, es que esto que nos pasa a nosotros dos juntos no pasa en ningún otro lado del mundo'\".</p><p><strong>Ca7riel</strong> (Pousta, 2022): \"Volvimos porque nos extrañábamos como hermanos, pero también porque nos dimos cuenta de que la bestia que creamos juntos camina sola y tiene hambre propia\".</p>",
      foto: "images/era4-auto.jpg", youtube: "",
      datos: [{etiqueta:"Período", valor:"2022–2023"}]
    },
    {
      fecha: "2024-01-01", hasta: "2024-10-03", categoria: "Era",
      titulo: "Baño María: Pop Up", lugar: "Argentina / gira",
      colorEra: "var(--magenta)",
      teaser: "",
      descripcion: "<p>Baño María se convierte en el primer álbum de estudio de larga duración de Ca7riel & Paco Amoroso. Es la era del jacuzzi, de la fiesta constante y del coqueteo con el pop electrónico bailable, donde el dúo lleva su universo estético y sonoro a una nueva escala. Mientras tanto, la prensa internacional empieza a notar que alrededor de ellos está ocurriendo algo distinto.</p><p><strong>Paco Amoroso</strong> (The Guardian, 2025, recordando el impacto del álbum): \"La música pop actual le tiene miedo a ofender, es todo demasiado limpio y corporativo. Nosotros con Baño María vinimos a devolverle el peligro, el sudor y la deformidad\".</p>",
      foto: "images/era5-bano-maria.webp", youtube: "",
      datos: [{etiqueta:"Período", valor:"Enero – 3 de octubre de 2024"}]

    {
      fecha: "2024-10-04", hasta: "2025-12-31", categoria: "Era",
      titulo: "Papota: The Big Bang Duo", lugar: "Global",
      colorEra: "var(--lime)",
      teaser: "Estallido y expansión global",
      descripcion: "<p>El Tiny Desk se convierte en un fenómeno viral histórico y marca un punto de inflexión. La banda trasciende definitivamente las fronteras argentinas y alcanza una escala global: gira por Europa, desembarca en Asia —donde los bautizan \"Katopako\" en Tower Records Shibuya— y llega al Main Stage de festivales como Fuji Rock, Glastonbury y Coachella.</p><p><strong>Ca7riel</strong> (Rolling Stone Japan, 2025): \"Había japoneses en el Fuji Rock que no entendían un carajo de nuestra jerga ni de lo que decíamos, pero cuando explota el groove de la banda, el cuerpo entiende mucho antes que la cabeza\".</p>",
      foto: "images/era6-papota-globos.jpeg", youtube: "",

    {
      fecha: "2026-01-01", hasta: "2026-12-31", categoria: "Era",
      titulo: "Free Spirits: Global Pop Stars", lugar: "Global",
      colorEra: "var(--gold)",
      teaser: "",
      descripcion: "<p>Tras la explosión internacional, la dupla deja de ocupar el lugar de revelación para consolidarse como cabeza de cartel en los mercados anglo y europeo. Frente a la presión del éxito y de la industria, construyen el concepto del Free Spirits Wellness Center, un centro de rehabilitación espiritual ficticio que utiliza la ironía como respuesta al fenómeno global que los rodea. Es la etapa en la que comparten escena y colaboran con figuras como Sting, Anderson .Paak y Jack Black, demostrando que se puede jugar en las grandes ligas de la industria sin perder un milímetro de su irreverente esencia.</p>",

/* =============================================================
   3) LÓGICA — no hace falta tocar de acá para abajo
   ============================================================= */
  // Configuración de esta página en particular (cada página la define
  // antes de este script, en su propio bloque <script> chico).
  const CFG = window.PAGE_CONFIG || {};
  const CATS_PERMITIDAS = CFG.categoriasPermitidas || Object.keys(CATEGORIAS).filter(c => c !== 'Era');
  const SOLO_BISAGRA = !!CFG.soloBisagra;

  let activeCats = new Set(CATS_PERMITIDAS);
  function getYear(fecha){ return parseInt(fecha.slice(0,4), 10); }

  const NOMBRES_MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  function formatearFecha(iso){
    const [y, m, d] = iso.split('-').map(Number);
    return `${d} ${NOMBRES_MES[m-1]} ${y}`;
  }

  
  function initFilters(){
    const pillWrap = document.getElementById('cat-pills');
    const clavesAMostrar = CATS_PERMITIDAS;

    function pintarActivo(){
      document.querySelectorAll('.pill').forEach(b => {
        const esActivo = b.dataset.cat === 'TODAS'
          ? activeCats.size === clavesAMostrar.length
          : activeCats.size === 1 && activeCats.has(b.dataset.cat);
        if(esActivo){
          b.classList.add('active');
          b.style.background = b.dataset.cat === 'TODAS' ? 'var(--ink)' : CATEGORIAS[b.dataset.cat].color;
          b.style.color = '#fff';
        } else {
          b.classList.remove('active');
          b.style.background = 'transparent';
          b.style.color = 'var(--text-dim)';
        }
      });
    }

    // Pill "Todas" — vuelve a mostrar todas las categorías con un solo click
    const bTodas = document.createElement('button');
    bTodas.className = 'pill active';
    bTodas.textContent = 'Todas';
    bTodas.dataset.cat = 'TODAS';
    bTodas.addEventListener('click', () => {
      activeCats = new Set(clavesAMostrar);
      pintarActivo();
      render();
    });
    pillWrap.appendChild(bTodas);

    clavesAMostrar.forEach(cat => {
      const info = CATEGORIAS[cat];
      if(!info) return;
      const b = document.createElement('button');
      b.className = 'pill';
      b.textContent = cat;
      b.style.setProperty('--cat-color', info.color);
      b.dataset.cat = cat;
      b.addEventListener('click', () => {
        // Selección única: mostrar SOLO esta categoría (no hace falta apagar el resto a mano)
        activeCats = new Set([cat]);
        pintarActivo();
        render();
      });
      pillWrap.appendChild(b);
    });

    pintarActivo();
  }

  function cardThumb(ev){
    if(ev.foto){
      return `<img src="${ev.foto}" alt="${ev.titulo}">${ev.youtube ? '<div class="tl-play-badge">▶</div>' : ''}`;
    }
    if(ev.youtube){
      // Sin foto propia: usamos la miniatura automática de YouTube, así no hace
      // falta subir una imagen para que la tarjeta se vea con contenido visual.
      return `<img src="https://img.youtube.com/vi/${ev.youtube}/hqdefault.jpg" alt="${ev.titulo}"><div class="tl-play-badge">▶</div>`;
    }
    return `<div class="ph">📷<br>Espacio para tu foto</div>`;
  }

  
  function render(){
    const wrap = document.getElementById('timeline');
    wrap.innerHTML = '';

    const erasCompletas = DATA.filter(d => d.categoria === 'Era');

    let hitos = DATA
      .filter(d => d.categoria !== 'Era')
      .filter(d => (d.categorias || []).some(c => activeCats.has(c)));

    // Esta página muestra SOLO los hitos de una Era en particular
    if(CFG.eraSolo){
      hitos = hitos.filter(h => {
        const era = eraDeFecha(h.fecha, erasCompletas);
        return era && era.titulo === CFG.eraSolo;
      });
    }

    hitos.sort((a, b) => a.fecha.localeCompare(b.fecha));

    if(hitos.length === 0){
      wrap.innerHTML = `<div class="empty-state">No hay hitos con estos filtros.<br>Probá sumar categorías.</div>`;
      return;
    }

    hitos.forEach((ev, i) => {
      const delay = Math.min(i * 0.04, 0.6);
      wrap.appendChild(renderHito(ev, delay));
    });
  }

  // Encuentra la Era vigente de una fecha: la de fecha de inicio más reciente
  // que sea <= la fecha dada.
  function eraDeFecha(fecha, erasData){
    let found = null;
    erasData.forEach(era => { if(era.fecha <= fecha) { if(!found || era.fecha > found.fecha) found = era; } });
    return found;
  }

  // Al hacer click en un hito, va DIRECTO al link externo (YouTube o el
  // artículo/entrevista) en una pestaña nueva — no abre ningún modal.
  // Solo si un hito no tiene ni video ni link (por ejemplo, un dato de
  // contexto sin fuente propia), se muestra el modal como respaldo.
  function irADestino(ev){
    if(ev.youtube){ window.open(`https://www.youtube.com/watch?v=${ev.youtube}`, '_blank', 'noopener'); }
    else if(ev.enlace){ window.open(ev.enlace, '_blank', 'noopener'); }
    else{ openModal(ev); }
  }

  function renderHito(ev, delay){
    const colores = catColors(ev.categorias);
    const el = document.createElement('div');
    const esMayor = ev.nivel === 'mayor';
    el.className = 'tl-row' + (esMayor ? ' tl-row-mayor' : '');
    el.style.animationDelay = `${delay}s`;
    const catTags = (ev.categorias || []).map((c, i) =>
      `<span class="tl-cat" style="--tag-color:${colores[i]}">${c}</span>`
    ).join('');
    const sinMiniatura = !ev.foto && !ev.youtube;
    el.innerHTML = `
      ${sinMiniatura ? '' : `<div class="tl-row-thumb">${cardThumb(ev)}</div>`}
      <div class="tl-row-info">
        <span class="tl-date">${formatearFecha(ev.fecha)}</span>${catTags}
        <div class="tl-title">${ev.titulo}${ev.publico ? ` <span class="tl-publico">(${ev.publico})</span>` : ''}</div>
        ${ev.lugar ? `<div class="tl-lugar">📍 ${ev.lugar}</div>` : ''}
        ${ev.teaser ? `<div class="tl-teaser">${ev.teaser}</div>` : ''}
        ${ev.enlace ? `<div class="tl-leer">Leer la nota ↗</div>` : ''}
      </div>
    `;
    el.addEventListener('click', () => irADestino(ev));
    return el;
  }

  function openModal(ev){
    const categoriasArr = ev.categorias || (ev.categoria ? [ev.categoria] : []);
    const colores = catColors(categoriasArr);
    const color = colores[0] || 'var(--lime)';
    const media = document.getElementById('modal-media');
    const photoBox = document.getElementById('modal-photo');

    // Miniatura siempre visible: prioridad a la foto propia; si no hay,
    // usamos la miniatura automática de YouTube (funciona siempre, incluso
    // si el video tiene restricciones de embebido). El botón "Ver en YouTube"
    // abre el video real en una pestaña nueva — ya no se intenta embeber
    // el reproductor adentro del modal, porque algunos videos lo bloquean
    // (Error 153) y quedaba una pantalla negra en vez de la miniatura.
    let imgSrc = '';
    if(ev.foto) imgSrc = ev.foto;
    else if(ev.youtube) imgSrc = `https://img.youtube.com/vi/${ev.youtube}/hqdefault.jpg`;

    if(imgSrc){
      media.innerHTML = `<img src="${imgSrc}" alt="${ev.titulo}">` +
        (ev.youtube ? `<a class="modal-yt-link" href="https://www.youtube.com/watch?v=${ev.youtube}" target="_blank" rel="noopener">▶ Ver en YouTube</a>` : '');
      media.classList.remove('hidden');
    } else {
      media.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-family:var(--mono);">📷 Sin foto/video todavía</div>`;
    }

    photoBox.classList.add('hidden');
    photoBox.innerHTML = '';

    const catEl = document.getElementById('modal-cat');
    catEl.innerHTML = categoriasArr.map((c, i) =>
      `<span class="modal-cat-chip" style="background:color-mix(in srgb, ${colores[i]} 22%, transparent); color:${colores[i]}">${c}</span>`
    ).join('');
    document.getElementById('modal-date').textContent = ev.hasta
      ? `${getYear(ev.fecha)} – ${getYear(ev.hasta)}`
      : formatearFecha(ev.fecha);
    document.getElementById('modal-title').textContent = ev.titulo + (ev.publico ? ` (${ev.publico})` : '');
    document.getElementById('modal-desc').textContent = ev.descripcion || '';
    document.getElementById('modal-desc').style.display = ev.descripcion ? '' : 'none';

    const datosChips = (ev.datos || []).map(d => `<div class="data-chip">${d.etiqueta}: <b>${d.valor}</b></div>`);
    if(ev.lugar) datosChips.unshift(`<div class="data-chip">📍 <b>${ev.lugar}</b></div>`);
    document.getElementById('modal-data').innerHTML = datosChips.join('');

    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target.id === 'modal-overlay') closeModal(); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

  // Completa el encabezado (título, período, foto, texto) leyendo el objeto
  // Era correspondiente directamente de DATA, así el texto vive en un solo
  // lugar (el array DATA) y no se duplica en el HTML.
  function pintarEncabezadoEra(){
    const eras = DATA.filter(d => d.categoria === 'Era').sort((a,b) => a.fecha.localeCompare(b.fecha));
    const idx = eras.findIndex(e => e.titulo === CFG.eraSolo);
    if(idx === -1) return;
    const era = eras[idx];

    if(CFG.colorEra){
      const hero = document.querySelector('.hero');
      hero.style.setProperty('--hero-bg', CFG.colorEra);
      hero.style.setProperty('--hero-fg', CFG.colorEraTexto || '#111111');
    }

    document.getElementById('era-eyebrow').textContent = `ERA ${idx + 1}/7`;
    document.getElementById('era-titulo').textContent = era.titulo.toUpperCase();
    document.getElementById('era-shows').textContent = CFG.showsAcumulados || '—';
    const rango = era.hasta && getYear(era.fecha) !== getYear(era.hasta)
      ? `${getYear(era.fecha)}–${getYear(era.hasta)}` : `${getYear(era.fecha)}`;
    document.getElementById('era-periodo').textContent = `${rango} · ${era.teaser || ''}`;

    // El bloque de foto(s) + texto se arma acá: si "era.fotos" tiene 2 fotos,
    // van en fila arriba y el texto ocupa el ancho completo debajo. Si solo
    // hay "era.foto" (una sola), se mantiene el layout de siempre (foto al
    // costado del texto).
    const bloque = document.getElementById('era-bloque');
    const listaFotos = (era.fotos && era.fotos.length) ? era.fotos : (era.foto ? [era.foto] : []);
    const textoHTML = era.descripcion || '';

    if(listaFotos.length >= 2){
      bloque.className = 'era-bloque era-bloque-doble';
      bloque.innerHTML = `
        <div class="era-fotos-fila">
          ${listaFotos.slice(0,2).map(f => `<div class="era-foto"><img src="${f}" alt="${era.titulo}"></div>`).join('')}
        </div>
        <div class="era-texto">${textoHTML}</div>
      `;
    } else {
      bloque.className = 'era-bloque';
      bloque.innerHTML = `
        <div class="era-foto">${listaFotos[0] ? `<img src="${listaFotos[0]}" alt="${era.titulo}">` : 'Sin foto todavía'}</div>
        <div class="era-texto">${textoHTML}</div>
      `;
    }

    const prevA = document.getElementById('era-prev');
    const nextA = document.getElementById('era-next');
    const prevB = document.getElementById('era-prev-bottom');
    const nextB = document.getElementById('era-next-bottom');
    if(idx > 0){
      prevA.href = CFG.hrefEras[idx-1]; prevA.textContent = `◀ ${eras[idx-1].titulo}`;
      prevB.href = CFG.hrefEras[idx-1]; prevB.textContent = `◀ ${eras[idx-1].titulo}`;
    } else {
      prevA.classList.add('vacio'); prevB.classList.add('vacio');
    }
    if(idx < eras.length - 1){
      nextA.href = CFG.hrefEras[idx+1]; nextA.textContent = `${eras[idx+1].titulo} ▶`;
      nextB.href = CFG.hrefEras[idx+1]; nextB.textContent = `${eras[idx+1].titulo} ▶`;
    } else {
      nextA.classList.add('vacio'); nextB.classList.add('vacio');
    }

    document.title = `${era.titulo} — Universo Musical CA7RIEL & Paco Amoroso`;
  }

  /* ---------- Init ---------- */
  pintarEncabezadoEra();
  initFilters();
  render();

  /* ---------- Footer: fecha de última actualización (automática) ---------- */
  (function setLastUpdate(){
    const el = document.getElementById('last-update');
    if(!el) return;
    const d = new Date(document.lastModified);
    if(isNaN(d.getTime())){ el.textContent = 'sin datos'; return; }
    el.textContent = d.toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' });
  })();
</script>
